name: nitro_workspace
homepage: https://nitro.shreeman.dev
repository: https://github.com/Shreemanarjun/nitro_ecosystem
publish_to: none

environment:
  sdk: ^3.11.3

workspace:
  - packages/nitro
  - packages/nitro/example
  - packages/nitro_annotations
  - packages/nitro_generator
  - packages/nitrogen_cli
  - my_camera
  - my_camera/example
  - nitro_battery
  - nitro_battery/example
  - benchmark
  - benchmark/example
  - test_projects/packages/nitro_type_coverage
  - test_projects/testing_project
  - test_projects/testing_project/example
dependency_overrides:
  matcher: 0.12.20
  test_api: 0.7.12
