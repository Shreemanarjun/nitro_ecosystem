# CI — Cross-bridge performance regression gate (S7-P2)
#
# Runs the benchmark suite (raw FFI vs Nitro paths vs MethodChannel) on the
# macOS desktop embedder and enforces machine-independent bridge-tier ratios:
#   * Nitro leaf call stays within 2.5× of the raw FFI floor
#   * Nitro checked call stays within 4× of the raw FFI floor
#   * Nitro stays ≥5× faster than MethodChannel
#
# Absolute-µs baselines are NOT gated here — shared runners are too noisy.
# Record/gate those on dedicated hardware via:
#   benchmark/tool/bench.sh --mode full --gate all
#
# Trigger: push to main + manual dispatch (not PRs — a full macOS desktop
# build per PR is slow, and the ratio gate on main catches regressions
# before release).

name: Benchmark (macOS) CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'benchmark/**'
      - '.github/workflows/ci_benchmark.yml'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Iteration scale'
        type: choice
        options: [quick, full]
        default: quick

jobs:
  bench-macos:
    name: macOS — FFI vs Nitro vs MethodChannel
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Get workspace dependencies
        run: flutter pub get

      - name: Run benchmark with relative regression gate
        run: >
          bash benchmark/tool/bench.sh -d macos
          --mode ${{ github.event.inputs.mode || 'quick' }}
          --gate relative

      - name: Publish analysis to job summary
        if: always()
        run: |
          if [ -f benchmark/example/build/integration_response_data.json ]; then
            dart run benchmark/tool/format_report.dart \
              benchmark/example/build/integration_response_data.json \
              --baselines-dir benchmark/example/assets/baselines \
              --compare-dir benchmark/results \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-macos
          path: benchmark/results/
          if-no-files-found: ignore

  # ── Desktop C++ tiers: Linux (GTK) and Windows (MSVC) ─────────────────────
  # These run the same harness — MethodChannel and platform-bridge cases that
  # a platform doesn't implement are auto-skipped and reported as such, while
  # the core Nitro-vs-raw-FFI gates stay mandatory everywhere.

  bench-linux:
    name: Linux — FFI vs Nitro vs MethodChannel
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Newly wired platform — observe before making it required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang cmake ninja-build pkg-config libgtk-3-dev \
            liblzma-dev xvfb

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get workspace dependencies
        run: flutter pub get

      - name: Run benchmark with relative regression gate (headless)
        run: >
          xvfb-run -a bash benchmark/tool/bench.sh -d linux
          --mode ${{ github.event.inputs.mode || 'quick' }}
          --gate relative

      - name: Probe native module libs (diagnose crash)
        if: failure()
        run: |
          BUNDLE=benchmark/example/build/linux/x64/profile/bundle/lib
          ls -la "$BUNDLE" 2>/dev/null || echo "bundle lib dir missing"
          dart benchmark/tool/probe_desktop.dart "$BUNDLE" || true

      - name: Publish analysis to job summary
        if: always()
        run: |
          if [ -f benchmark/example/build/integration_response_data.json ]; then
            dart run benchmark/tool/format_report.dart \
              benchmark/example/build/integration_response_data.json \
              --baselines-dir benchmark/example/assets/baselines \
              --compare-dir benchmark/results \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-linux
          path: benchmark/results/
          if-no-files-found: ignore

  # ── Mobile: Android emulator + iOS simulator ───────────────────────────────
  # Emulators/simulators cannot run profile builds, so these legs are
  # FUNCTIONAL verification (debug, --gate none): every bridge tier must run
  # and all tiers must return the identical FNV-1a workload hash — a mismatch
  # fails the run inside the harness regardless of the gate setting. Real
  # performance numbers come from physical devices:
  #   benchmark/tool/bench.sh -d <device-id> --mode full --update-baseline

  bench-android:
    name: Android (emulator) — functional verification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Newly wired platform — observe before making it required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get workspace dependencies
        run: flutter pub get

      - name: Run benchmark on emulator (debug, functional + hash verification)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          disable-animations: true
          emulator-options: -no-snapshot -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash benchmark/tool/bench.sh -d emulator-5554 --debug --gate none --mode quick

      - name: Publish analysis to job summary
        if: always()
        run: |
          if [ -f benchmark/example/build/integration_response_data.json ]; then
            dart run benchmark/tool/format_report.dart \
              benchmark/example/build/integration_response_data.json \
              --compare-dir benchmark/results \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-android
          path: benchmark/results/
          if-no-files-found: ignore

  bench-ios:
    name: iOS (simulator) — functional verification
    runs-on: macos-latest
    timeout-minutes: 45
    # Newly wired platform — observe before making it required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get workspace dependencies
        run: flutter pub get

      - name: Boot iOS simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)['devices']
          for runtime, devices in sorted(data.items(), reverse=True):
              if 'iOS' not in runtime: continue
              for d in devices:
                  if d.get('isAvailable') and 'iPhone' in d['name']:
                      print(d['udid']); raise SystemExit
          ")
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Run benchmark on simulator (debug, functional + hash verification)
        run: >
          bash benchmark/tool/bench.sh -d ${{ steps.sim.outputs.udid }}
          --debug --gate none --mode quick

      - name: Publish analysis to job summary
        if: always()
        run: |
          if [ -f benchmark/example/build/integration_response_data.json ]; then
            dart run benchmark/tool/format_report.dart \
              benchmark/example/build/integration_response_data.json \
              --compare-dir benchmark/results \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-ios
          path: benchmark/results/
          if-no-files-found: ignore

  bench-windows:
    name: Windows — FFI vs Nitro vs MethodChannel
    runs-on: windows-latest
    timeout-minutes: 45
    # Newly wired platform — observe before making it required.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get workspace dependencies
        run: flutter pub get

      - name: Run benchmark with relative regression gate
        shell: bash
        run: >
          bash benchmark/tool/bench.sh -d windows
          --mode ${{ github.event.inputs.mode || 'quick' }}
          --gate relative

      - name: Probe native module libs (diagnose crash)
        if: failure()
        shell: bash
        run: |
          BUNDLE=benchmark/example/build/windows/x64/runner/Profile
          ls -la "$BUNDLE" 2>/dev/null || echo "bundle dir missing"
          dart benchmark/tool/probe_desktop.dart "$BUNDLE" || true

      - name: Publish analysis to job summary
        if: always()
        shell: bash
        run: |
          if [ -f benchmark/example/build/integration_response_data.json ]; then
            dart run benchmark/tool/format_report.dart \
              benchmark/example/build/integration_response_data.json \
              --baselines-dir benchmark/example/assets/baselines \
              --compare-dir benchmark/results \
              >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report-windows
          path: benchmark/results/
          if-no-files-found: ignore
