name: nitro_generator
description: >
  Code generator for Nitro Modules (Nitrogen).
  Converts *.native.dart specs to Dart FFI, Kotlin, Swift, and C++ bindings.
version: 0.2.1
homepage: https://www.shreeman.dev
repository: https://github.com/Shreemanarjun/nitro_ecosystem
issue_tracker: https://github.com/Shreemanarjun/nitro_ecosystem/issues
documentation: https://nitro.shreeman.dev/
funding:
  - https://buymeacoffee.com/shreemanarjun
topics:
  - codegen
  - ffi
  - flutter
  - native
  - bridge

environment:
  sdk: ^3.11.3

dependencies:
  analyzer: '>=6.4.0 <8.0.0'
  build: ^2.4.1
  source_gen: ^1.5.0
  dart_style: ^2.3.2
  path: ^1.9.0
  nitro: ^0.2.0

dev_dependencies:
  build_test: ^2.2.0
  build_runner: ^2.4.8
  test: ^1.25.0
  lints: ^6.0.0
